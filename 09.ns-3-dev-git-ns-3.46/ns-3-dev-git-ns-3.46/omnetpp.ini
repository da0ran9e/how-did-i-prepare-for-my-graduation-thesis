[General]

# =============================================
# Always include the main Castalia.ini file
# =============================================
include ../Parameters/Castalia.ini
include ../Parameters/WirelessChannel/Ideal.ini 


sim-time-limit = 5000000s

############traces
SN.wirelessChannel.collectTraceInfo = false
SN.node[*].Communication.Radio.collectTraceInfo = false
SN.node[*].Communication.MAC.collectTraceInfo = false
SN.node[*].Communication.Routing.collectTraceInfo = true
SN.node[*].Application.collectTraceInfo = false
SN.node[*].SensorManager.collectTraceInfo = false
SN.node[*].ResourceManager.collectTraceInfo = false

SN.node[*].Communication.Radio.TxOutputPower = "0dBm"

SN.node[*].startupOffset = 1
SN.node[*].startupRandomization = 10
###########
SN.node[*].ApplicationName = "ThroughputTest"

###############
SN.node[*].Communication.RoutingProtocolName = "GSTEBRouting"
SN.node[*].Communication.Routing.topoCSVAbsPath = ""
################
SN.node[*].Communication.Routing.roundLength = 100s

###########
SN.wirelessChannel.onlyStaticNodes = true
SN.wirelessChannel.sigma = 0
SN.wirelessChannel.bidirectionalSigma = 0
SN.wirelessChannel.pathLossExponent = 1.0
SN.wirelessChannel.PLd0 = 63

###########
SN.node[*].Communication.Radio.RadioParametersFile = "../Parameters/Radio/CC2420.txt"
SN.node[*].Communication.Radio.mode = "IDEAL"
SN.node[*].Communication.Radio.collisionModel = 0
###########
SN.node[*].Communication.Routing.maxNetFrameSize = 8152
SN.node[*].Communication.Routing.isSink = true
SN.node[*].Communication.Routing.sinkId = 0
SN.node[*].Communication.MAC.macMaxPacketSize = 8152
SN.node[*].Communication.Radio.maxPhyFrameSize = 8152

SN.node[*].Communication.Radio.bufferSize = 1000
SN.node[*].Communication.MAC.macBufferSize = 1000

SN.node[*].Communication.MAC.MACProtocolName = "TMAC"

SN.node[*].ResourceManager.initialEnergy = 0.25
SN.node[*].ResourceManager.ramSize = 10.0            # kB  (TelosB = 10 kB)        [Profile B: 4.0 kB]
SN.node[*].ResourceManager.flashSize = 48.0          # kB  (TelosB = 48 kB)        [Profile B: 128.0 kB]
SN.node[*].ResourceManager.imageSize = 28.0          # kB  (Contiki/TinyOS footprint ~20–30 kB) 

SN.node[*].ResourceManager.flashWriteCost = 0.010    # J/kB  => 10 mJ per kB written
SN.node[*].ResourceManager.flashReadCost  = 0.0005   # J/kB  => 0.5 mJ per kB read

SN.node[*].ResourceManager.cpuPowerSpeedLevelNames = "low medium high"
SN.node[*].ResourceManager.cpuPowerPerLevel        = "0.0001  0.00055  0.0012"   # mW: low, active, busy 
SN.node[*].ResourceManager.cpuSpeedPerLevel        = "1  8  16"         # MHz 
SN.node[*].ResourceManager.cpuInitialPowerLevel    = 1                 # start at "medium" 
SN.node[*].ResourceManager.sigmaCPUClockDrift      = 0.00003           # ~30 ppm

SN.node[*].ResourceManager.baselineNodePower = 0   # mW  baseline idle power (MCU + minimal peripherals)

SN.numNodes = 400
SN.field_x = 1500
SN.field_y = 1500
SN.cellWidth = 100
SN.cellHeight = 100

