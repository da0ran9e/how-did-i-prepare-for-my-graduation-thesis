[General]

sim-time-limit = 100s

############traces
SN.wirelessChannel.collectTraceInfo = false
SN.node[*].Radio.collectTraceInfo = false
SN.node[*].MAC.collectTraceInfo = false
SN.node[*].Routing.collectTraceInfo = true
SN.node[*].Application.collectTraceInfo = false
SN.node[*].SensorManager.collectTraceInfo = false
SN.node[*].ResourceManager.collectTraceInfo = false

SN.node[*].Radio.TxOutputPower = "15dBm"

SN.node[*].startupOffset = 1
SN.node[*].startupRandomization = 10
###########
SN.node[*].ApplicationName = "ThroughputTest"

###############
SN.node[*].RoutingProtocolName = "PeceeRoutingProtocol"
SN.node[*].Routing.topoCSVAbsPath = ""
################
SN.node[*].Routing.roundLength = 20s

###########
SN.wirelessChannel.onlyStaticNodes = true
SN.wirelessChannel.sigma = 0
SN.wirelessChannel.bidirectionalSigma = 0
SN.wirelessChannel.pathLossExponent = 1.0
SN.wirelessChannel.PLd0 = 40

###########
SN.node[*].Radio.RadioParametersFile = "../Parameters/Radio/CC2420.txt"
SN.node[*].Radio.mode = "IDEAL"
SN.node[*].Radio.collisionModel = 0
###########
SN.node[*].Routing.maxNetFrameSize = 8152
SN.node[*].Routing.isSink = true
SN.node[*].Routing.sinkId = 0
SN.node[*].MAC.macMaxPacketSize = 8152
SN.node[*].Radio.maxPhyFrameSize = 8152

SN.node[*].Radio.bufferSize = 1000
SN.node[*].MAC.macBufferSize = 1000

SN.node[*].MAC.MACProtocolName = "TMAC"

SN.node[*].ResourceManager.initialEnergy = 0.25
SN.node[*].ResourceManager.ramSize = 10.0
SN.node[*].ResourceManager.flashSize = 48.0
SN.node[*].ResourceManager.imageSize = 28.0

SN.node[*].ResourceManager.flashWriteCost = 0.010
SN.node[*].ResourceManager.flashReadCost  = 0.0005

SN.node[*].ResourceManager.cpuPowerSpeedLevelNames = "low medium high"
SN.node[*].ResourceManager.cpuPowerPerLevel        = "0.0001  0.00055  0.0012"
SN.node[*].ResourceManager.cpuSpeedPerLevel        = "1  8  16"
SN.node[*].ResourceManager.cpuInitialPowerLevel    = 1
SN.node[*].ResourceManager.sigmaCPUClockDrift      = 0.00003

SN.node[*].ResourceManager.baselineNodePower = 0

################### 
